<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Alat - Monitoring Kalibrasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
        }
        .sidebar a:hover { background: rgba(255,255,255,0.1); }
        .sidebar a.active { background: rgba(255,255,255,0.2); }
        .filter-bar {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 sidebar">
                <div class="text-center py-4">
                    <i class="fas fa-tools fa-3x text-white"></i>
                    <h5 class="text-white mt-2">Kalibrasi 2W</h5>
                </div>
                <a href="dashboard.html"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                <a href="alat.html" class="active"><i class="fas fa-microscope me-2"></i> Data Alat</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </div>
            
            <div class="col-md-10 p-4">
                <h2><i class="fas fa-table-list me-2"></i>Data Alat Kalibrasi</h2>
                
                <div class="filter-bar">
                    <div class="row">
                        <div class="col-md-3">
                            <input type="text" id="searchInput" class="form-control" placeholder="Cari alat...">
                        </div>
                        <div class="col-md-3">
                            <select id="statusFilter" class="form-control">
                                <option value="">Semua Status</option>
                                <option value="Valid">Valid</option>
                                <option value="Warning">Akan Expired</option>
                                <option value="Expired">Expired</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-primary" onclick="exportToExcel()">
                                <i class="fas fa-file-excel"></i> Export Excel
                            </button>
                            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#kalibrasiModal">
                                <i class="fas fa-plus"></i> Input Kalibrasi
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover" id="alatTable">
                        <thead class="table-dark">
                            <tr><th>Kode</th><th>Nama Alat</th><th>Lokasi</th><th>Tipe</th><th>Due Date</th><th>Status</th><th>Aksi</th></tr>
                        </thead>
                        <tbody id="alatTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Input Kalibrasi -->
    <div class="modal fade" id="kalibrasiModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Input Hasil Kalibrasi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="kalibrasiForm">
                        <div class="mb-3">
                            <label>Pilih Alat</label>
                            <select id="alatSelect" class="form-control" required></select>
                        </div>
                        <div class="mb-3">
                            <label>Tanggal Kalibrasi</label>
                            <input type="date" id="tglKalibrasi" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Hasil/Nilai</label>
                            <input type="text" id="nilaiHasil" class="form-control" placeholder="Contoh: 25.4 µm" required>
                        </div>
                        <div class="mb-3">
                            <label>Status Kalibrasi</label>
                            <select id="statusKalibrasi" class="form-control" required>
                                <option value="pass">Pass (Memenuhi)</option>
                                <option value="fail">Fail (Tidak Memenuhi)</option>
                                <option value="adjust">Adjust (Disesuaikan)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Upload Sertifikat (PDF)</label>
                            <input type="file" id="sertifikat" class="form-control" accept=".pdf">
                        </div>
                        <div class="mb-3">
                            <label>Catatan</label>
                            <textarea id="catatan" class="form-control" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Simpan Kalibrasi</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <script>
        const API_URL = 'YOUR_GOOGLE_SHEETS_API_URL';
        
        function daysUntil(dateStr) {
            const due = new Date(dateStr);
            const today = new Date();
            const diffTime = due - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }
        
        async function loadAlatData() {
            const response = await fetch(`${API_URL}?sheet=alat_kalibrasi`);
            let alatData = await response.json();
            
            const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const statusFilter = document.getElementById('statusFilter')?.value || '';
            
            alatData = alatData.map(alat => ({
                ...alat,
                statusText: daysUntil(alat.due_date) < 0 ? 'Expired' : (daysUntil(alat.due_date) <= 7 ? 'Warning' : 'Valid'),
                sisaHari: daysUntil(alat.due_date)
            }));
            
            if (search) {
                alatData = alatData.filter(alat => 
                    alat.nama_alat.toLowerCase().includes(search) || 
                    alat.kode_alat.toLowerCase().includes(search)
                );
            }
            
            if (statusFilter) {
                alatData = alatData.filter(alat => alat.statusText === statusFilter);
            }
            
            const tbody = document.getElementById('alatTableBody');
            tbody.innerHTML = alatData.map(alat => `
                <tr>
                    <td>${alat.kode_alat}</td>
                    <td>${alat.nama_alat}</td>
                    <td>${alat.lokasi_painting}</td>
                    <td>${alat.tipe || '-'}</td>
                    <td class="${alat.sisaHari <= 7 ? 'text-warning' : ''}">${alat.due_date}</td>
                    <td>
                        <span class="badge bg-${alat.statusText === 'Valid' ? 'success' : (alat.statusText === 'Warning' ? 'warning' : 'danger')}">
                            ${alat.statusText}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="viewHistory('${alat.id}')">
                            <i class="fas fa-history"></i> Riwayat
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function exportToExcel() {
            const response = await fetch(`${API_URL}?sheet=alat_kalibrasi`);
            const data = await response.json();
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Alat Kalibrasi');
            XLSX.writeFile(wb, `kalibrasi_${new Date().toISOString().split('T')[0]}.xlsx`);
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        // Event listeners
        document.getElementById('searchInput')?.addEventListener('keyup', loadAlatData);
        document.getElementById('statusFilter')?.addEventListener('change', loadAlatData);
        
        loadAlatData();
        setInterval(loadAlatData, 60000);
    </script>
</body>
</html>
