<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Data Alat - Kalibrasi Painting 2W</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Tambahan untuk modal dan form */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }
    
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .modal-container {
      background: var(--bg-card);
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-body {
      padding: 24px;
    }
    
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-bar .input-field {
      flex: 1;
      min-width: 200px;
    }
    
    .action-buttons {
      display: flex;
      gap: 8px;
    }
    
    .action-buttons button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    
    .btn-edit { color: var(--primary); }
    .btn-edit:hover { background: var(--primary-bg); }
    .btn-delete { color: var(--danger); }
    .btn-delete:hover { background: #fee2e2; }
    
    .table-container {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    
    .data-table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
    }
    
    .data-table th,
    .data-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    .data-table th {
      background: var(--bg-page);
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .data-table tr:hover td {
      background: var(--primary-bg);
    }
    
    .empty-row td {
      text-align: center;
      padding: 48px !important;
      color: var(--text-muted);
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .modal-container {
        width: 95%;
      }
      .data-table th, .data-table td {
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">
        <i class="fas fa-microscope" style="color: white;"></i>
      </div>
      <div class="logo-text">Kalibrasi System</div>
    </div>
    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-item">
        <i class="fas fa-tachometer-alt"></i> Dashboard
      </a>
      <a href="alat.html" class="nav-item active">
        <i class="fas fa-tools"></i> Data Alat
      </a>
      <a href="outstanding.html" class="nav-item">
        <i class="fas fa-clock"></i> Outstanding
      </a>
      <a href="jadwal.html" class="nav-item">
        <i class="fas fa-calendar-alt"></i> Jadwal Kalibrasi
      </a>
      <a href="log-notif.html" class="nav-item">
        <i class="fas fa-envelope"></i> Log Notifikasi
      </a>
      <a href="pic.html" class="nav-item">
        <i class="fas fa-users"></i> PIC & Lokasi
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <!-- Topbar -->
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <div class="user-info">
        <span id="userLabel" style="font-size: 14px; font-weight: 500;">User</span>
        <div class="avatar">
          <i class="fas fa-user"></i>
        </div>
        <button onclick="logout()" style="background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted);">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div style="padding: 24px;">
      
      <!-- Header -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
        <div>
          <h2 style="font-size: 20px; font-weight: 700;">Data Alat Kalibrasi</h2>
          <p style="color: var(--text-muted); font-size: 13px; margin-top: 4px;">Kelola master data alat-alat painting</p>
        </div>
        <button class="btn-primary" onclick="openModal()">
          <i class="fas fa-plus"></i> Tambah Alat
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <input type="text" id="searchInput" class="input-field" placeholder="🔍 Cari nama alat, no. control, atau lokasi...">
        <select id="statusFilter" class="input-field" style="width: auto; min-width: 130px;">
          <option value="all">Semua Status</option>
          <option value="Valid">Valid</option>
          <option value="Jatuh Tempo">Jatuh Tempo</option>
          <option value="Overdue">Overdue</option>
        </select>
        <button class="btn-outline" onclick="exportToCSV()">
          <i class="fas fa-download"></i> Export CSV
        </button>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>No. Control</th>
              <th>Nama Alat</th>
              <th>No. Seri</th>
              <th>Merk</th>
              <th>Lokasi</th>
              <th>Tgl Kalibrasi</th>
              <th>Periode</th>
              <th>Status</th>
              <th style="text-align: center;">Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="9" class="empty-row"><i class="fas fa-spinner fa-spin"></i> Memuat data...</td</tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- Modal Tambah/Edit -->
  <div id="modal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="modalTitle" style="font-size: 18px; font-weight: 700;">Tambah Alat</h3>
        <button onclick="closeModal()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted);">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="formAlat">
        <div class="modal-body">
          <input type="hidden" id="editIndex" value="-1">
          
          <div class="form-row">
            <div class="form-group">
              <label>Nama Alat <span style="color: var(--danger);">*</span></label>
              <input type="text" id="f_nama" class="input-field" required placeholder="Contoh: Spray Gun ALT-01">
            </div>
            <div class="form-group">
              <label>No. Seri <span style="color: var(--danger);">*</span></label>
              <input type="text" id="f_seri" class="input-field" required placeholder="Nomor seri alat">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>No. Control <span style="color: var(--danger);">*</span></label>
              <input type="text" id="f_control" class="input-field" required placeholder="Contoh: ALT-001">
            </div>
            <div class="form-group">
              <label>Kemampuan Pengukuran</label>
              <input type="text" id="f_kemampuan" class="input-field" placeholder="Contoh: 0-100 bar">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>Merk</label>
              <input type="text" id="f_merk" class="input-field" placeholder="Merk alat">
            </div>
            <div class="form-group">
              <label>Tahun Pemakaian</label>
              <input type="number" id="f_tahun" class="input-field" placeholder="Tahun">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>Lokasi Pemakaian</label>
              <input type="text" id="f_lokasi" class="input-field" value="PAINTING (Booth L)" placeholder="Lokasi">
            </div>
            <div class="form-group">
              <label>Periode Kalibrasi</label>
              <select id="f_periode" class="input-field">
                <option value="1 Bulan">1 Bulan</option>
                <option value="3 Bulan">3 Bulan</option>
                <option value="6 Bulan">6 Bulan</option>
                <option value="1 Tahun" selected>1 Tahun</option>
              </select>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>Tanggal Kalibrasi Terakhir</label>
              <input type="date" id="f_tgl" class="input-field">
            </div>
            <div class="form-group">
              <label>Email PIC</label>
              <input type="email" id="f_email" class="input-field" placeholder="email@example.com">
            </div>
          </div>
          
          <div class="form-group">
            <label>Keterangan</label>
            <textarea id="f_ket" rows="2" class="input-field" placeholder="Catatan tambahan..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-outline" onclick="closeModal()">Batal</button>
          <button type="submit" class="btn-primary">
            <i class="fas fa-save"></i> Simpan
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ========== KONFIGURASI ==========
    // GANTI DENGAN API_URL ANDA
    const API_URL = 'https://script.google.com/macros/s/AKfycbxXXXXXX/exec';
    
    let allData = [];
    let filteredData = [];

    // ========== SIDEBAR TOGGLE ==========
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    const menuToggle = document.getElementById('menuToggle');
    
    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('hidden');
      mainContent.classList.toggle('sidebar-hidden');
    });

    // ========== AUTH CHECK ==========
    if(sessionStorage.getItem('auth') !== '1') window.location.href = 'index.html';
    document.getElementById('userLabel').innerText = sessionStorage.getItem('user')?.toUpperCase() || 'USER';

    // ========== HELPER FUNCTIONS ==========
    function calcStatus(tgl, periode) {
      if(!tgl) return { label: 'Belum Kalibrasi', days: null, cls: 'badge-danger' };
      const t = new Date(tgl), now = new Date();
      let next = new Date(t);
      const p = (periode||'').toLowerCase();
      if(p.includes('bulan')) next.setMonth(next.getMonth() + parseInt(p));
      else if(p.includes('tahun')) next.setFullYear(next.getFullYear() + parseInt(p));
      else next.setFullYear(next.getFullYear() + 1);
      
      const diff = Math.ceil((next - now) / 86400000);
      if(diff < 0) return { label: 'Overdue', days: diff, cls: 'badge-danger' };
      if(diff <= 30) return { label: 'Jatuh Tempo', days: diff, cls: 'badge-warning' };
      return { label: 'Valid', days: diff, cls: 'badge-success' };
    }

    function getStatusClass(label) {
      if(label === 'Valid') return 'badge-success';
      if(label === 'Jatuh Tempo') return 'badge-warning';
      return 'badge-danger';
    }

    // ========== LOAD DATA ==========
    async function loadData() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        allData = data.map((item, idx) => ({ ...item, _idx: idx }));
        applyFilters();
      } catch(e) {
        console.error(e);
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="9" class="empty-row"><i class="fas fa-exclamation-triangle"></i> Gagal memuat data</td</tr>`;
      }
    }

    function applyFilters() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;
      
      filteredData = allData.filter(item => {
        // Search filter
        const matchSearch = !searchTerm || 
          (item.nama_alat || '').toLowerCase().includes(searchTerm) ||
          (item.nomor_control || '').toLowerCase().includes(searchTerm) ||
          (item.lokasi_pemakaian || '').toLowerCase().includes(searchTerm);
        
        // Status filter
        const status = calcStatus(item.tanggal_kalibrasi, item.periode_kalibrasi);
        const matchStatus = statusFilter === 'all' || status.label === statusFilter;
        
        return matchSearch && matchStatus;
      });
      
      renderTable(filteredData);
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      
      if(data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" class="empty-row"><i class="fas fa-folder-open"></i> Tidak ada data</td</tr>`;
        return;
      }
      
      tbody.innerHTML = data.map(item => {
        const status = calcStatus(item.tanggal_kalibrasi, item.periode_kalibrasi);
        return `<tr>
          <td><strong style="font-family: monospace;">${item.nomor_control || '-'}</strong></td>
          <td>${item.nama_alat || '-'}</td>
          <td style="color: var(--text-muted);">${item.nomor_seri || '-'}</td>
          <td>${item.merk || '-'}</td>
          <td>${item.lokasi_pemakaian || '-'}</td>
          <td style="color: var(--text-muted);">${item.tanggal_kalibrasi ? new Date(item.tanggal_kalibrasi).toLocaleDateString('id-ID') : '-'}</td>
          <td>${item.periode_kalibrasi || '-'}</td>
          <td><span class="status-badge ${status.cls}">${status.label}</span></td>
          <td class="action-buttons">
            <button class="btn-edit" onclick="editItem(${item._idx})" title="Edit"><i class="fas fa-edit"></i></button>
            <button class="btn-delete" onclick="deleteItem(${item._idx})" title="Hapus"><i class="fas fa-trash-alt"></i></button>
          </td>
        </tr>`;
      }).join('');
    }

    // ========== CRUD OPERATIONS ==========
    function openModal(idx = -1) {
      const modal = document.getElementById('modal');
      const title = document.getElementById('modalTitle');
      const editIndex = document.getElementById('editIndex');
      
      if(idx === -1) {
        title.innerText = 'Tambah Alat';
        editIndex.value = -1;
        document.getElementById('formAlat').reset();
        document.getElementById('f_lokasi').value = 'PAINTING (Booth L)';
      } else {
        title.innerText = 'Edit Alat';
        const item = allData[idx];
        editIndex.value = idx;
        document.getElementById('f_nama').value = item.nama_alat || '';
        document.getElementById('f_seri').value = item.nomor_seri || '';
        document.getElementById('f_control').value = item.nomor_control || '';
        document.getElementById('f_kemampuan').value = item.kemampuan_pengukuran || '';
        document.getElementById('f_merk').value = item.merk || '';
        document.getElementById('f_tahun').value = item.tahun_pemakaian || '';
        document.getElementById('f_lokasi').value = item.lokasi_pemakaian || '';
        document.getElementById('f_periode').value = item.periode_kalibrasi || '1 Tahun';
        document.getElementById('f_tgl').value = item.tanggal_kalibrasi || '';
        document.getElementById('f_email').value = item.email_pic || '';
        document.getElementById('f_ket').value = item.keterangan || '';
      }
      
      modal.classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    document.getElementById('formAlat').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const idx = parseInt(document.getElementById('editIndex').value);
      const payload = {
        action: idx === -1 ? 'add' : 'update',
        _index: idx,
        nama_alat: document.getElementById('f_nama').value,
        nomor_seri: document.getElementById('f_seri').value,
        nomor_control: document.getElementById('f_control').value,
        kemampuan_pengukuran: document.getElementById('f_kemampuan').value,
        merk: document.getElementById('f_merk').value,
        tahun_pemakaian: document.getElementById('f_tahun').value,
        lokasi_pemakaian: document.getElementById('f_lokasi').value,
        periode_kalibrasi: document.getElementById('f_periode').value,
        tanggal_kalibrasi: document.getElementById('f_tgl').value,
        email_pic: document.getElementById('f_email').value,
        keterangan: document.getElementById('f_ket').value
      };
      
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
      submitBtn.disabled = true;
      
      try {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        closeModal();
        await loadData();
      } catch(err) {
        alert('Gagal menyimpan data');
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });
    
    window.editItem = (idx) => openModal(idx);
    
    window.deleteItem = async (idx) => {
      if(!confirm('Yakin ingin menghapus alat ini?')) return;
      
      try {
        await fetch(API_URL, { 
          method: 'POST', 
          body: JSON.stringify({ action: 'delete', _index: idx }) 
        });
        await loadData();
      } catch(e) {
        alert('Gagal menghapus data');
      }
    };
    
    window.exportToCSV = () => {
      if(filteredData.length === 0) {
        alert('Tidak ada data untuk diexport');
        return;
      }
      
      const headers = ['No. Control', 'Nama Alat', 'No. Seri', 'Merk', 'Lokasi', 'Tanggal Kalibrasi', 'Periode', 'Status'];
      const rows = filteredData.map(item => {
        const status = calcStatus(item.tanggal_kalibrasi, item.periode_kalibrasi);
        return [
          item.nomor_control || '',
          item.nama_alat || '',
          item.nomor_seri || '',
          item.merk || '',
          item.lokasi_pemakaian || '',
          item.tanggal_kalibrasi || '',
          item.periode_kalibrasi || '',
          status.label
        ];
      });
      
      const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `data_alat_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    };
    
    window.logout = () => {
      sessionStorage.clear();
      window.location.href = 'index.html';
    };
    
    // ========== EVENT LISTENERS ==========
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('statusFilter').addEventListener('change', applyFilters);
    
    // Close modal on overlay click
    document.getElementById('modal').addEventListener('click', (e) => {
      if(e.target === document.getElementById('modal')) closeModal();
    });
    
    // ========== INIT ==========
    loadData();
  </script>
</body>
</html>
