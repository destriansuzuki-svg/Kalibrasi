<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalibrasi System - Painting 2W</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.2s ease;
    }
    
    /* ========== DARK MODE (default) ========== */
    :root {
      --bg-page: #1a1f2e;
      --bg-surface: #252b3d;
      --bg-card: #2d3448;
      --bg-input: #1e2436;
      --border: #3a4055;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-light: rgba(59,130,246,0.1);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --header-bg: #1e2538;
    }
    
    body.light-mode {
      --bg-page: #edf2f7;
      --bg-surface: #ffffff;
      --bg-card: #ffffff;
      --bg-input: #f7fafc;
      --border: #e2e8f0;
      --text-primary: #1a202c;
      --text-secondary: #4a5568;
      --text-muted: #718096;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: rgba(37,99,235,0.08);
      --header-bg: #ffffff;
    }
    
    body {
      background-color: var(--bg-page);
      color: var(--text-primary);
    }
    
    /* Card & Surface */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    
    .surface {
      background: var(--bg-surface);
      border: 1px solid var(--border);
    }
    
    /* Input */
    .input-field {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text-primary);
      transition: all 0.15s;
      width: 100%;
    }
    
    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    
    .input-field::placeholder {
      color: var(--text-muted);
    }
    
    select.input-field {
      cursor: pointer;
    }
    
    /* Button */
    .btn-primary {
      background: var(--accent);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-secondary:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--border);
    }
    
    .btn-danger:hover {
      background: rgba(239,68,68,0.1);
      border-color: var(--danger);
    }
    
    /* Status Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .badge-valid {
      background: rgba(16,185,129,0.12);
      color: var(--success);
      border: 1px solid rgba(16,185,129,0.3);
    }
    
    .badge-due {
      background: rgba(245,158,11,0.12);
      color: var(--warning);
      border: 1px solid rgba(245,158,11,0.3);
    }
    
    .badge-overdue {
      background: rgba(239,68,68,0.12);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.3);
    }
    
    /* Table */
    .data-table {
      width: 100%;
      font-size: 13px;
    }
    
    .data-table th {
      text-align: left;
      padding: 12px 12px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .data-table td {
      padding: 12px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }
    
    .data-table tr:hover td {
      background: var(--accent-light);
    }
    
    /* Stat Card */
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    .modal-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 560px;
      max-height: 85vh;
      overflow-y: auto;
    }
    
    /* Theme Toggle - Classic Switch */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 4px;
      cursor: pointer;
    }
    
    .theme-option {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    
    .theme-option.active {
      background: var(--accent);
      color: white;
    }
    
    /* Scrollbar */
    .table-wrap {
      overflow-x: auto;
    }
    
    .table-wrap::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }
    
    .table-wrap::-webkit-scrollbar-track {
      background: var(--bg-surface);
      border-radius: 3px;
    }
    
    .table-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    
    /* Utility */
    .text-accent { color: var(--accent); }
    .border-accent { border-color: var(--accent); }
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- Header / Navbar -->
  <div class="surface border-b" style="border-top: 3px solid var(--accent);">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-accent rounded flex items-center justify-center">
          <i class="fas fa-microscope text-white text-sm"></i>
        </div>
        <div>
          <h1 class="font-bold text-sm tracking-wide">KALIBRASI MANAGEMENT SYSTEM</h1>
          <p class="text-xs text-secondary" style="color: var(--text-secondary);">PT Suzuki Indomobil Motor - Painting 2W</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <!-- Theme Toggle Classic -->
        <div class="theme-toggle" id="themeToggleBtn">
          <span class="theme-option" data-theme="dark">
            <i class="fas fa-moon"></i> <span class="hidden sm:inline">Dark</span>
          </span>
          <span class="theme-option" data-theme="light">
            <i class="fas fa-sun"></i> <span class="hidden sm:inline">Light</span>
          </span>
        </div>
        <div class="w-px h-6 bg-border" style="background: var(--border);"></div>
        <div class="flex items-center gap-2">
          <i class="fas fa-user-circle text-secondary"></i>
          <span class="text-sm" id="userLabel" style="color: var(--text-secondary);">USER</span>
        </div>
        <button onclick="logout()" class="text-sm px-3 py-1.5 rounded border" style="border-color: var(--border); color: var(--text-secondary);">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-5">
    
    <!-- Statistics Row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="stat-card">
        <div class="stat-label">Total Alat</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Valid</div>
        <div class="stat-value" style="color: var(--success);" id="statValid">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Jatuh Tempo</div>
        <div class="stat-value" style="color: var(--warning);" id="statDue">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Overdue</div>
        <div class="stat-value" style="color: var(--danger);" id="statOverdue">0</div>
      </div>
    </div>

    <!-- Action Bar -->
    <div class="flex flex-wrap gap-3 mb-5">
      <div class="flex-1 min-w-[200px]">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-xs" style="color: var(--text-muted);"></i>
          <input type="text" id="searchInput" class="input-field pl-8" placeholder="Cari nama alat, no. control, atau lokasi...">
        </div>
      </div>
      <button onclick="openModal()" class="btn-primary">
        <i class="fas fa-plus"></i> Tambah Alat
      </button>
      <button onclick="triggerEmail()" class="btn-secondary">
        <i class="fas fa-envelope"></i> Kirim Notifikasi
      </button>
    </div>

    <!-- Data Table -->
    <div class="card table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>No</th>
            <th>Nama Alat</th>
            <th>No. Seri</th>
            <th>No. Control</th>
            <th>Kemampuan</th>
            <th>Merk</th>
            <th>Tahun</th>
            <th>Lokasi</th>
            <th>Periode</th>
            <th>Tgl Kalibrasi</th>
            <th>Status</th>
            <th style="text-align: center;">Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="12" style="text-align: center; padding: 40px;">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-container">
      <div class="p-5">
        <div class="flex justify-between items-center mb-4">
          <h2 id="modalTitle" class="text-lg font-semibold" style="color: var(--text-primary);">Tambah Alat</h2>
          <button onclick="closeModal()" style="color: var(--text-muted);">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <form id="formAlat">
          <input type="hidden" id="editIndex" value="-1">
          <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="text" id="f_nama" required class="input-field" placeholder="Nama Alat *">
            <input type="text" id="f_seri" required class="input-field" placeholder="No. Seri *">
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="text" id="f_control" required class="input-field" placeholder="No. Control *">
            <input type="text" id="f_kemampuan" class="input-field" placeholder="Kemampuan Pengukuran">
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="text" id="f_merk" class="input-field" placeholder="Merk">
            <input type="number" id="f_tahun" class="input-field" placeholder="Tahun Pemakaian">
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="text" id="f_lokasi" value="PAINTING (Booth L)" class="input-field" placeholder="Lokasi">
            <select id="f_periode" class="input-field">
              <option value="1 Bulan">1 Bulan</option>
              <option value="3 Bulan">3 Bulan</option>
              <option value="6 Bulan">6 Bulan</option>
              <option value="1 Tahun" selected>1 Tahun</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="date" id="f_tgl" class="input-field">
            <input type="email" id="f_email" class="input-field" placeholder="Email PIC">
          </div>
          <textarea id="f_ket" rows="2" class="input-field mb-4" placeholder="Keterangan"></textarea>
          <div class="flex gap-3">
            <button type="button" onclick="closeModal()" class="btn-secondary flex-1">Batal</button>
            <button type="submit" class="btn-primary flex-1">Simpan</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // ========== KONFIGURASI ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbxXXXXXX/exec'; // GANTI DENGAN URL ANDA

    // ========== THEME MANAGEMENT ==========
    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark';
      setTheme(saved);
    }
    
    function setTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light-mode');
      } else {
        document.body.classList.remove('light-mode');
      }
      localStorage.setItem('theme', theme);
      
      // Update active state di toggle
      document.querySelectorAll('.theme-option').forEach(opt => {
        if (opt.dataset.theme === theme) {
          opt.classList.add('active');
        } else {
          opt.classList.remove('active');
        }
      });
    }
    
    function toggleThemeUI(theme) {
      setTheme(theme);
    }
    
    // Event listener untuk theme toggle
    document.querySelectorAll('.theme-option').forEach(opt => {
      opt.addEventListener('click', () => {
        toggleThemeUI(opt.dataset.theme);
      });
    });

    // ========== AUTH ==========
    if(sessionStorage.getItem('auth') !== '1') window.location.replace('index.html');
    document.getElementById('userLabel').innerHTML = (sessionStorage.getItem('user') || 'USER').toUpperCase();

    // ========== DATA ==========
    let allData = [];

    async function loadData() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        allData = data.map((d, i) => ({...d, _idx: i}));
        renderTable(allData);
        updateStats(allData);
      } catch(e) {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="12" style="text-align:center; padding:40px; color:var(--danger);">Gagal memuat data</td></tr>`;
      }
    }

    function calcStatus(tgl, periode) {
      if(!tgl) return { label: 'Belum Kalibrasi', cls: 'badge-overdue' };
      const t = new Date(tgl), now = new Date();
      let next = new Date(t);
      const p = (periode||'').toLowerCase();
      if(p.includes('bulan')) next.setMonth(next.getMonth() + parseInt(p));
      else if(p.includes('tahun')) next.setFullYear(next.getFullYear() + parseInt(p));
      else next.setFullYear(next.getFullYear() + 1);
      
      const diff = Math.ceil((next - now) / 86400000);
      if(diff < 0) return { label: 'Overdue', cls: 'badge-overdue' };
      if(diff <= 30) return { label: 'Jatuh Tempo', cls: 'badge-due' };
      return { label: 'Valid', cls: 'badge-valid' };
    }

    function renderTable(data) {
      const tb = document.getElementById('tableBody');
      if(!data.length) {
        tb.innerHTML = `<tr><td colspan="12" style="text-align:center; padding:40px; color:var(--text-muted);">Tidak ada data</td></tr>`;
        return;
      }
      
      tb.innerHTML = data.map((r, i) => {
        const st = calcStatus(r.tanggal_kalibrasi, r.periode_kalibrasi);
        return `<tr>
          <td>${i+1}</td>
          <td><span style="font-weight:500;">${r.nama_alat||'-'}</span></td>
          <td style="color: var(--text-secondary);">${r.nomor_seri||'-'}</td>
          <td><span style="font-family: monospace; color: var(--accent);">${r.nomor_control||'-'}</span></td>
          <td style="color: var(--text-secondary);">${r.kemampuan_pengukuran||'-'}</td>
          <td style="color: var(--text-secondary);">${r.merk||'-'}</td>
          <td style="color: var(--text-secondary);">${r.tahun_pemakaian||'-'}</td>
          <td style="color: var(--text-secondary);">${r.lokasi_pemakaian||'-'}</td>
          <td style="color: var(--text-secondary);">${r.periode_kalibrasi||'-'}</td>
          <td style="color: var(--text-secondary);">${r.tanggal_kalibrasi ? new Date(r.tanggal_kalibrasi).toLocaleDateString('id-ID') : '-'}</td>
          <td><span class="badge ${st.cls}">${st.label}</span></td>
          <td style="text-align:center;">
            <button onclick="editItem(${r._idx})" style="color: var(--accent); margin:0 4px;"><i class="fas fa-edit"></i></button>
            <button onclick="deleteItem(${r._idx})" style="color: var(--danger); margin:0 4px;"><i class="fas fa-trash"></i></button>
          </td>
        八`;
      }).join('');
    }

    function updateStats(data) {
      let v=0, d=0, o=0;
      data.forEach(r => {
        const s = calcStatus(r.tanggal_kalibrasi, r.periode_kalibrasi);
        if(s.label==='Valid') v++;
        else if(s.label==='Jatuh Tempo') d++;
        else o++;
      });
      document.getElementById('statTotal').textContent = data.length;
      document.getElementById('statValid').textContent = v;
      document.getElementById('statDue').textContent = d;
      document.getElementById('statOverdue').textContent = o;
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = allData.filter(r => 
        (r.nama_alat||'').toLowerCase().includes(q) ||
        (r.nomor_control||'').toLowerCase().includes(q) ||
        (r.lokasi_pemakaian||'').toLowerCase().includes(q)
      );
      renderTable(filtered);
    });

    // Modal
    function openModal(idx=-1) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalTitle').innerText = idx===-1 ? 'Tambah Alat' : 'Edit Alat';
      document.getElementById('editIndex').value = idx;
      if(idx===-1) {
        document.getElementById('formAlat').reset();
        document.getElementById('f_lokasi').value = 'PAINTING (Booth L)';
      } else {
        const r = allData[idx];
        document.getElementById('f_nama').value = r.nama_alat||'';
        document.getElementById('f_seri').value = r.nomor_seri||'';
        document.getElementById('f_control').value = r.nomor_control||'';
        document.getElementById('f_kemampuan').value = r.kemampuan_pengukuran||'';
        document.getElementById('f_merk').value = r.merk||'';
        document.getElementById('f_tahun').value = r.tahun_pemakaian||'';
        document.getElementById('f_lokasi').value = r.lokasi_pemakaian||'';
        document.getElementById('f_periode').value = r.periode_kalibrasi||'1 Tahun';
        document.getElementById('f_tgl').value = r.tanggal_kalibrasi||'';
        document.getElementById('f_email').value = r.email_pic||'';
        document.getElementById('f_ket').value = r.keterangan||'';
      }
    }
    
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    document.getElementById('formAlat').addEventListener('submit', async e => {
      e.preventDefault();
      const idx = parseInt(document.getElementById('editIndex').value);
      const payload = {
        action: idx===-1 ? 'add' : 'update',
        _index: idx,
        nama_alat: document.getElementById('f_nama').value,
        nomor_seri: document.getElementById('f_seri').value,
        nomor_control: document.getElementById('f_control').value,
        kemampuan_pengukuran: document.getElementById('f_kemampuan').value,
        merk: document.getElementById('f_merk').value,
        tahun_pemakaian: document.getElementById('f_tahun').value,
        lokasi_pemakaian: document.getElementById('f_lokasi').value,
        periode_kalibrasi: document.getElementById('f_periode').value,
        tanggal_kalibrasi: document.getElementById('f_tgl').value,
        email_pic: document.getElementById('f_email').value,
        keterangan: document.getElementById('f_ket').value
      };

      const btn = e.target.querySelector('button[type="submit"]');
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      btn.disabled = true;

      try {
        await fetch(API_URL, { method:'POST', body: JSON.stringify(payload) });
        closeModal();
        await loadData();
      } catch(err) { alert('Gagal menyimpan'); }
      finally { btn.innerHTML = orig; btn.disabled = false; }
    });

    window.editItem = (idx) => openModal(idx);
    window.deleteItem = async (idx) => {
      if(!confirm('Hapus alat ini?')) return;
      try {
        await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'delete', _index: idx }) });
        await loadData();
      } catch(e) { alert('Gagal hapus'); }
    };
    window.triggerEmail = async () => {
      if(!confirm('Kirim notifikasi email ke PIC?')) return;
      try {
        await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'send_notification' }) });
        alert('Notifikasi terkirim');
      } catch(e) { alert('Gagal kirim'); }
    };
    window.logout = () => {
      sessionStorage.clear();
      window.location.replace('index.html');
    };

    // Init
    initTheme();
    loadData();
  </script>
</body>
</html>
