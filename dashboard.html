<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kalibrasi Painting 2W</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <h1 class="text-2xl font-bold mb-4">📅 Dashboard Kalibrasi - Painting 2W</h1>

  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded shadow"><h3 class="text-gray-500">Total Alat</h3><p id="total" class="text-2xl font-bold">0</p></div>
    <div class="bg-white p-4 rounded shadow"><h3 class="text-gray-500">Due This Month</h3><p id="dueMonth" class="text-2xl font-bold text-yellow-600">0</p></div>
    <div class="bg-white p-4 rounded shadow"><h3 class="text-gray-500">Overdue</h3><p id="overdue" class="text-2xl font-bold text-red-600">0</p></div>
    <div class="bg-white p-4 rounded shadow"><h3 class="text-gray-500">On Track</h3><p id="onTrack" class="text-2xl font-bold text-green-600">0</p></div>
  </div>

  <table class="w-full bg-white rounded shadow">
    <thead class="bg-gray-100">
      <tr><th class="p-3 text-left">Kode</th><th class="p-3 text-left">Nama</th><th class="p-3 text-left">Next Cal</th><th class="p-3 text-left">Status</th></tr>
    </thead>
    <tbody id="equipmentTable"></tbody>
  </table>

<script>
  // Dummy data (ganti dengan fetch API/database nanti)
  const tools = [
    { kode: 'P2W-001', nama: 'Viscometer', next: '2026-04-10', status: '' },
    { kode: 'P2W-002', nama: 'Spray Gun Pressure Gauge', next: '2026-05-05', status: '' },
    { kode: 'P2W-003', nama: 'Thickness Gauge', next: '2026-03-20', status: '' },
  ];

  const today = new Date();
  const currentMonth = today.getMonth();

  function getStatus(nextDateStr) {
    const next = new Date(nextDateStr);
    const diffDays = (next - today) / (1000 * 60 * 60 * 24);
    if (next < today) return 'Overdue';
    if (diffDays <= 30) return 'Due Soon';
    return 'On Track';
  }

  function render() {
    let due = 0, over = 0, track = 0;
    const tbody = document.getElementById('equipmentTable');
    tbody.innerHTML = '';

    tools.forEach(t => {
      t.status = getStatus(t.next);
      const nextDate = new Date(t.next);
      if (nextDate.getMonth() === currentMonth && nextDate.getFullYear() === today.getFullYear()) due++;
      if (t.status === 'Overdue') over++;
      if (t.status === 'On Track') track++;

      const statusClass = {
        'Overdue': 'bg-red-100 text-red-700',
        'Due Soon': 'bg-yellow-100 text-yellow-700',
        'On Track': 'bg-green-100 text-green-700'
      }[t.status];

      tbody.innerHTML += `
        <tr class="border-t hover:bg-gray-50">
          <td class="p-3">${t.kode}</td>
          <td class="p-3">${t.nama}</td>
          <td class="p-3">${t.next}</td>
          <td class="p-3"><span class="px-2 py-1 rounded text-xs font-medium ${statusClass}">${t.status}</span></td>
        </tr>`;
    });

    document.getElementById('total').textContent = tools.length;
    document.getElementById('dueMonth').textContent = due;
    document.getElementById('overdue').textContent = over;
    document.getElementById('onTrack').textContent = track;
  }

  render();
</script>
</body>
</html>
