<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Kalibrasi Painting 2W</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* Global Variables untuk Light/Dark Mode */
    :root {
      --bg-primary: #0b1221;
      --bg-card: rgba(15,23,42,0.85);
      --border-color: rgba(6,182,212,0.2);
      --input-bg: rgba(15,23,42,0.9);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --table-header: #1e293b;
      --table-row-hover: rgba(30,41,59,0.4);
    }
    
    body.light-mode {
      --bg-primary: #f0f4f8;
      --bg-card: rgba(255,255,255,0.95);
      --border-color: rgba(6,182,212,0.3);
      --input-bg: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --table-header: #e2e8f0;
      --table-row-hover: rgba(203,213,225,0.4);
    }
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    .font-tech { font-family: 'Orbitron', sans-serif; }
    
    .card { 
      background: var(--bg-card); 
      border: 1px solid var(--border-color);
      transition: background 0.3s ease, border 0.3s ease;
    }
    
    .input-box { 
      background: var(--input-bg); 
      border: 1px solid rgba(6,182,212,0.25); 
      color: var(--text-primary);
      transition: all 0.2s; 
    }
    
    .input-box:focus { 
      border-color: #06b6d4; 
      box-shadow: 0 0 0 3px rgba(6,182,212,0.15); 
      outline: none; 
    }
    
    .input-box::placeholder { color: #64748b; }
    
    body.light-mode .input-box::placeholder { color: #94a3b8; }
    
    .btn-cyan { 
      background: linear-gradient(90deg, #0891b2, #06b6d4); 
      transition: all 0.2s; 
    }
    
    .btn-cyan:hover { 
      box-shadow: 0 0 16px rgba(6,182,212,0.6); 
      transform: translateY(-1px); 
    }
    
    .status-valid { 
      background: rgba(34,197,94,0.15); 
      color: #4ade80; 
      border: 1px solid rgba(34,197,94,0.4); 
    }
    
    .status-due { 
      background: rgba(234,179,8,0.15); 
      color: #facc15; 
      border: 1px solid rgba(234,179,8,0.4); 
    }
    
    .status-overdue { 
      background: rgba(239,68,68,0.15); 
      color: #f87171; 
      border: 1px solid rgba(239,68,68,0.4); 
    }
    
    .table-wrap { 
      overflow-x: auto; 
      scrollbar-width: thin; 
    }
    
    .table-wrap::-webkit-scrollbar { height: 6px; }
    .table-wrap::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 3px; }
    
    /* Light mode table */
    body.light-mode .table-wrap::-webkit-scrollbar-track { background: #e2e8f0; }
    
    th, td { white-space: nowrap; }
    
    .modal-bg { 
      background: rgba(2,6,23,0.85); 
      backdrop-filter: blur(4px); 
    }
    
    body.light-mode .modal-bg {
      background: rgba(255,255,255,0.85);
    }
    
    /* Toggle Switch */
    .theme-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    
    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #334155;
      transition: 0.3s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #06b6d4;
    }
    
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    
    /* Icons inside slider */
    .slider .fa-sun,
    .slider .fa-moon {
      position: absolute;
      top: 4px;
      font-size: 12px;
      transition: 0.3s;
    }
    
    .slider .fa-sun {
      left: 6px;
      color: #facc15;
    }
    
    .slider .fa-moon {
      right: 6px;
      color: #94a3b8;
    }
    
    input:not(:checked) + .slider .fa-sun { opacity: 0; }
    input:checked + .slider .fa-moon { opacity: 0; }
  </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="card border-b border-cyan-500/20 px-4 py-3 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-gradient-to-br from-cyan-500 to-blue-600 rounded flex items-center justify-center">
        <i class="fas fa-tools text-white text-sm"></i>
      </div>
      <div>
        <h1 class="font-tech text-base font-bold text-white">NPCS <span class="text-cyan-400">PROD</span></h1>
        <p class="text-[10px] text-cyan-400/60 tracking-widest uppercase">Kalibrasi Painting 2W</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <!-- Theme Toggle -->
      <label class="theme-switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider">
          <i class="fas fa-sun"></i>
          <i class="fas fa-moon"></i>
        </span>
      </label>
      
      <span class="text-xs text-gray-400 hidden sm:inline"><i class="fas fa-user-circle mr-1"></i> <span id="userLabel">USER</span></span>
      <button onclick="logout()" class="text-xs bg-red-500/20 hover:bg-red-500/40 text-red-300 px-3 py-1.5 rounded border border-red-500/30 transition">
        <i class="fas fa-sign-out-alt mr-1"></i> Logout
      </button>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 p-4 max-w-7xl mx-auto w-full">
    
    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="card rounded-lg p-3">
        <p class="text-xs text-gray-400 mb-1">Total Alat</p>
        <p id="statTotal" class="text-xl font-bold text-white">0</p>
      </div>
      <div class="card rounded-lg p-3">
        <p class="text-xs text-gray-400 mb-1">Valid</p>
        <p id="statValid" class="text-xl font-bold text-green-400">0</p>
      </div>
      <div class="card rounded-lg p-3">
        <p class="text-xs text-gray-400 mb-1">Jatuh Tempo (≤30 hari)</p>
        <p id="statDue" class="text-xl font-bold text-yellow-400">0</p>
      </div>
      <div class="card rounded-lg p-3">
        <p class="text-xs text-gray-400 mb-1">Overdue</p>
        <p id="statOverdue" class="text-xl font-bold text-red-400">0</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="flex flex-col sm:flex-row gap-3 mb-4">
      <div class="relative flex-1">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
        <input type="text" id="searchInput" class="input-box w-full pl-8 pr-3 py-2 rounded-lg text-sm placeholder-gray-500" placeholder="Cari nama, no. control, atau lokasi...">
      </div>
      <button onclick="openModal()" class="btn-cyan px-4 py-2 rounded-lg text-white text-sm font-semibold flex items-center gap-2">
        <i class="fas fa-plus"></i> Tambah Alat
      </button>
      <button onclick="triggerEmail()" class="bg-amber-500/20 hover:bg-amber-500/30 border border-amber-500/40 text-amber-300 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 transition">
        <i class="fas fa-paper-plane"></i> Kirim Notif Email
      </button>
    </div>

    <!-- Table -->
    <div class="card rounded-lg table-wrap">
      <table class="w-full text-sm text-left">
        <thead class="bg-slate-800/50 text-gray-400 border-b border-cyan-500/20">
          <tr>
            <th class="px-3 py-2.5 font-medium">No</th>
            <th class="px-3 py-2.5 font-medium">Nama Alat</th>
            <th class="px-3 py-2.5 font-medium">No. Seri</th>
            <th class="px-3 py-2.5 font-medium">No. Control</th>
            <th class="px-3 py-2.5 font-medium">Kemampuan</th>
            <th class="px-3 py-2.5 font-medium">Merk</th>
            <th class="px-3 py-2.5 font-medium">Tahun</th>
            <th class="px-3 py-2.5 font-medium">Lokasi</th>
            <th class="px-3 py-2.5 font-medium">Periode</th>
            <th class="px-3 py-2.5 font-medium">Tgl Kalibrasi</th>
            <th class="px-3 py-2.5 font-medium">Status</th>
            <th class="px-3 py-2.5 font-medium text-center">Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y divide-slate-700/50">
          <tr><td colspan="12" class="px-3 py-6 text-center text-gray-500">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg">
    <div class="card w-full max-w-lg rounded-xl p-5 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modalTitle" class="font-tech text-lg font-bold text-primary">Tambah Alat</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition"><i class="fas fa-times"></i></button>
      </div>
      <form id="formAlat" class="space-y-3">
        <input type="hidden" id="editIndex" value="-1">
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="f_nama" required class="input-box w-full px-3 py-2 rounded text-sm placeholder-gray-500" placeholder="Nama Alat *">
          <input type="text" id="f_seri" required class="input-box w-full px-3 py-2 rounded text-sm placeholder-gray-500" placeholder="No. Seri *">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="f_control" required class="input-box w-full px-3 py-2 rounded text-sm placeholder-gray-500" placeholder="No. Control *">
          <input type="text" id="f_kemampuan" class="input-box w-full px-3 py-2 rounded text-sm placeholder-gray-500" placeholder="Kemampuan Pengukuran">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="f_merk" class="input-box w-full px-3 py-2 rounded text-sm placeholder-gray-500" placeholder="Merk">
          <input type="number" id="f_tahun" class="input-box w-full px-3 py-2 rounded text-sm placeholder-gray-500" placeholder="Tahun Pemakaian">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="f_lokasi" value="PAINTING (Booth L)" class="input-box w-full px-3 py-2 rounded text-sm placeholder-gray-500" placeholder="Lokasi">
          <select id="f_periode" class="input-box w-full px-3 py-2 rounded text-sm">
            <option value="1 Bulan">1 Bulan</option>
            <option value="3 Bulan">3 Bulan</option>
            <option value="6 Bulan">6 Bulan</option>
            <option value="1 Tahun" selected>1 Tahun</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <input type="date" id="f_tgl" class="input-box w-full px-3 py-2 rounded text-sm">
          <input type="email" id="f_email" class="input-box w-full px-3 py-2 rounded text-sm placeholder-gray-500" placeholder="Email PIC (untuk notif)">
        </div>
        <textarea id="f_ket" rows="2" class="input-box w-full px-3 py-2 rounded text-sm placeholder-gray-500 resize-none" placeholder="Keterangan"></textarea>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeModal()" class="flex-1 py-2 rounded border border-gray-600 text-gray-300 text-sm hover:bg-slate-800 transition">Batal</button>
          <button type="submit" class="flex-1 btn-cyan py-2 rounded text-white text-sm font-semibold">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ⚠️ GANTI DENGAN WEB APP URL ANDA
    const API_URL = 'https://script.google.com/macros/s/AKfycbxXXXXXX/exec';

    // DARK MODE FUNCTION
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      const themeToggle = document.getElementById('themeToggle');
      
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        themeToggle.checked = true;
      } else {
        document.body.classList.remove('light-mode');
        themeToggle.checked = false;
      }
      
      // Update text color classes for dynamic elements
      updateTextColors();
    }
    
    function toggleTheme() {
      const themeToggle = document.getElementById('themeToggle');
      if (themeToggle.checked) {
        document.body.classList.add('light-mode');
        localStorage.setItem('theme', 'light');
      } else {
        document.body.classList.remove('light-mode');
        localStorage.setItem('theme', 'dark');
      }
      updateTextColors();
    }
    
    function updateTextColors() {
      const isLight = document.body.classList.contains('light-mode');
      const stats = document.querySelectorAll('.card .text-white');
      stats.forEach(el => {
        if (isLight) {
          el.style.color = '#0f172a';
        } else {
          el.style.color = '#ffffff';
        }
      });
    }
    
    // Auth Check
    if(sessionStorage.getItem('auth') !== '1') window.location.replace('index.html');
    document.getElementById('userLabel').textContent = (sessionStorage.getItem('user') || 'USER').toUpperCase();

    let allData = [];

    // Fetch Data
    async function loadData() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        allData = data.map((d, i) => ({...d, _idx: i}));
        renderTable(allData);
        updateStats(allData);
      } catch(e) {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="12" class="px-3 py-4 text-center text-red-400">Gagal memuat data. Periksa URL API.</td></tr>`;
      }
    }

    // Status Logic
    function calcStatus(tgl, periode) {
      if(!tgl) return { label: 'Belum Kalibrasi', cls: 'status-overdue' };
      const t = new Date(tgl), now = new Date();
      let next = new Date(t);
      const p = (periode||'').toLowerCase();
      if(p.includes('bulan')) next.setMonth(next.getMonth() + parseInt(p));
      else if(p.includes('tahun')) next.setFullYear(next.getFullYear() + parseInt(p));
      else next.setFullYear(next.getFullYear() + 1);
      
      const diff = Math.ceil((next - now) / 86400000);
      if(diff < 0) return { label: 'Overdue', cls: 'status-overdue' };
      if(diff <= 30) return { label: 'Jatuh Tempo', cls: 'status-due' };
      return { label: 'Valid', cls: 'status-valid' };
    }

    // Render Table
    function renderTable(data) {
      const tb = document.getElementById('tableBody');
      if(!data.length) { tb.innerHTML = `<tr><td colspan="12" class="px-3 py-6 text-center text-gray-500">Tidak ada data</td></tr>`; return; }
      
      tb.innerHTML = data.map((r, i) => {
        const st = calcStatus(r.tanggal_kalibrasi, r.periode_kalibrasi);
        return `<tr class="hover:bg-slate-800/40 transition">
          <td class="px-3 py-2.5 text-gray-400">${i+1}</td>
          <td class="px-3 py-2.5 font-medium text-primary">${r.nama_alat||'-'}</td>
          <td class="px-3 py-2.5 text-secondary">${r.nomor_seri||'-'}</td>
          <td class="px-3 py-2.5 font-mono text-cyan-400">${r.nomor_control||'-'}</td>
          <td class="px-3 py-2.5 text-secondary">${r.kemampuan_pengukuran||'-'}</td>
          <td class="px-3 py-2.5 text-secondary">${r.merk||'-'}</td>
          <td class="px-3 py-2.5 text-secondary">${r.tahun_pemakaian||'-'}</td>
          <td class="px-3 py-2.5 text-secondary">${r.lokasi_pemakaian||'-'}</td>
          <td class="px-3 py-2.5 text-secondary">${r.periode_kalibrasi||'-'}</td>
          <td class="px-3 py-2.5 text-secondary">${r.tanggal_kalibrasi ? new Date(r.tanggal_kalibrasi).toLocaleDateString('id-ID') : '-'}</td>
          <td class="px-3 py-2.5"><span class="px-2 py-0.5 rounded text-xs font-semibold ${st.cls}">${st.label}</span></td>
          <td class="px-3 py-2.5 text-center">
            <button onclick="editItem(${r._idx})" class="text-cyan-400 hover:text-cyan-300 mx-1" title="Edit"><i class="fas fa-pen-to-square"></i></button>
            <button onclick="deleteItem(${r._idx})" class="text-red-400 hover:text-red-300 mx-1" title="Hapus"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`;
      }).join('');
    }

    function updateStats(data) {
      let v=0, d=0, o=0;
      data.forEach(r => {
        const s = calcStatus(r.tanggal_kalibrasi, r.periode_kalibrasi);
        if(s.label==='Valid') v++; 
        else if(s.label==='Jatuh Tempo') d++; 
        else if(s.label==='Overdue') o++;
        else o++;
      });
      document.getElementById('statTotal').textContent = data.length;
      document.getElementById('statValid').textContent = v;
      document.getElementById('statDue').textContent = d;
      document.getElementById('statOverdue').textContent = o;
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = allData.filter(r => 
        (r.nama_alat||'').toLowerCase().includes(q) ||
        (r.nomor_control||'').toLowerCase().includes(q) ||
        (r.lokasi_pemakaian||'').toLowerCase().includes(q)
      );
      renderTable(filtered);
    });

    // Modal & Form
    window.openModal = function(idx=-1) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalTitle').textContent = idx===-1 ? 'Tambah Alat' : 'Edit Alat';
      document.getElementById('editIndex').value = idx;
      if(idx===-1) {
        document.getElementById('formAlat').reset();
        document.getElementById('f_lokasi').value = 'PAINTING (Booth L)';
      } else {
        const r = allData[idx];
        document.getElementById('f_nama').value = r.nama_alat||'';
        document.getElementById('f_seri').value = r.nomor_seri||'';
        document.getElementById('f_control').value = r.nomor_control||'';
        document.getElementById('f_kemampuan').value = r.kemampuan_pengukuran||'';
        document.getElementById('f_merk').value = r.merk||'';
        document.getElementById('f_tahun').value = r.tahun_pemakaian||'';
        document.getElementById('f_lokasi').value = r.lokasi_pemakaian||'';
        document.getElementById('f_periode').value = r.periode_kalibrasi||'1 Tahun';
        document.getElementById('f_tgl').value = r.tanggal_kalibrasi||'';
        document.getElementById('f_email').value = r.email_pic||'';
        document.getElementById('f_ket').value = r.keterangan||'';
      }
    }
    
    window.closeModal = function() { 
      document.getElementById('modal').classList.add('hidden'); 
    }

    document.getElementById('formAlat').addEventListener('submit', async e => {
      e.preventDefault();
      const idx = parseInt(document.getElementById('editIndex').value);
      const payload = {
        action: idx===-1 ? 'add' : 'update',
        _index: idx,
        nama_alat: document.getElementById('f_nama').value,
        nomor_seri: document.getElementById('f_seri').value,
        nomor_control: document.getElementById('f_control').value,
        kemampuan_pengukuran: document.getElementById('f_kemampuan').value,
        merk: document.getElementById('f_merk').value,
        tahun_pemakaian: document.getElementById('f_tahun').value,
        lokasi_pemakaian: document.getElementById('f_lokasi').value,
        periode_kalibrasi: document.getElementById('f_periode').value,
        tanggal_kalibrasi: document.getElementById('f_tgl').value,
        email_pic: document.getElementById('f_email').value,
        keterangan: document.getElementById('f_ket').value
      };

      const btn = e.target.querySelector('button[type="submit"]');
      const origText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Menyimpan...';
      btn.disabled = true;

      try {
        await fetch(API_URL, { method:'POST', body: JSON.stringify(payload) });
        closeModal();
        await loadData();
      } catch(err) { alert('Gagal menyimpan data'); }
      finally { btn.innerHTML = origText; btn.disabled = false; }
    });

    window.editItem = function(idx) { openModal(idx); }
    
    window.deleteItem = async function(idx) {
      if(!confirm('Hapus alat ini?')) return;
      try {
        await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'delete', _index: idx }) });
        await loadData();
      } catch(e) { alert('Gagal menghapus'); }
    }

    window.triggerEmail = async function() {
      if(!confirm('Kirim notifikasi email ke semua PIC yang jatuh tempo/overdue?')) return;
      try {
        await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'send_notification' }) });
        alert('✅ Notifikasi email berhasil dikirim!');
      } catch(e) { alert('❌ Gagal mengirim notifikasi. Cek Apps Script log.'); }
    }

    window.logout = function() {
      sessionStorage.clear();
      window.location.replace('index.html');
    }

    // Event listener untuk theme toggle
    document.getElementById('themeToggle').addEventListener('change', toggleTheme);
    
    // Init
    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      loadData();
    });
  </script>
</body>
</html>
