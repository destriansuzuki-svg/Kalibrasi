<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Dashboard - Monitoring Kalibrasi Painting 2W</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            transition: left 0.3s ease; z-index: 1050; overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header i { font-size: 50px; color: #667eea; }
        .sidebar-header h5 { color: white; margin-top: 10px; font-size: 18px; }
        .sidebar-header p { color: #94a3b8; font-size: 11px; }
        .sidebar-menu a {
            display: flex; align-items: center; padding: 14px 20px;
            color: #cbd5e1; text-decoration: none; gap: 12px;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: rgba(102,126,234,0.2); color: white; padding-left: 28px; }
        .sidebar-menu a i { width: 24px; }
        
        /* Overlay */
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1040; display: none;
        }
        .sidebar-overlay.active { display: block; }
        
        /* Main Content */
        .main-content { min-height: 100vh; padding: 15px; padding-bottom: 70px; }
        
        /* Navbar */
        .navbar-mobile {
            background: white; border-radius: 15px; padding: 12px 15px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-toggle { background: none; border: none; font-size: 24px; color: #667eea; cursor: pointer; }
        .user-avatar {
            width: 42px; height: 42px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold;
        }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-role { font-size: 11px; color: #64748b; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 15px; padding: 15px; }
        .stat-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 12px; }
        .stat-value { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #64748b; }
        
        /* Chart Card */
        .chart-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .chart-title { font-weight: 600; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; display: flex; justify-content: space-between; }
        
        /* Alert Items */
        .alert-item { padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 12px; }
        .alert-item.warning { background: #fef3c7; border-left: 4px solid #f59e0b; }
        .alert-item.danger { background: #fee2e2; border-left: 4px solid #ef4444; }
        
        /* Table */
        .table-responsive-custom { overflow-x: auto; }
        .table-custom { width: 100%; font-size: 13px; }
        .table-custom th, .table-custom td { padding: 10px 8px; white-space: nowrap; }
        
        .update-time { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 15px; }
        .fab-refresh {
            position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px;
            border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; color: white; font-size: 22px; cursor: pointer; z-index: 1000;
        }
        .toast-notification { position: fixed; top: 70px; right: 10px; left: 10px; z-index: 1100; max-width: 350px; margin-left: auto; }
        
        @media (min-width: 768px) {
            .sidebar { left: 0; width: 260px; }
            .menu-toggle { display: none; }
            .sidebar-overlay { display: none !important; }
            .main-content { margin-left: 260px; padding: 20px; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .toast-notification { right: 20px; left: auto; }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-tools"></i>
            <h5>Kalibrasi 2W</h5>
            <p>PT Suzuki Indomobil Motor</p>
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <a href="alat.html"><i class="fas fa-microscope"></i><span>Data Alat</span></a>
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </div>
    
    <div class="main-content">
        <div class="navbar-mobile">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="user-info-mobile">
                <div class="user-details text-end">
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-role" id="userRole"></div>
                </div>
                <div class="user-avatar" id="userAvatar">A</div>
            </div>
        </div>
        
        <div class="toast-notification" id="toastContainer"></div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="fas fa-microscope"></i></div>
                <div class="stat-value" id="totalAlat">0</div>
                <div class="stat-label">Total Alat</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="fas fa-check-circle"></i></div>
                <div class="stat-value" id="validAlat">0</div>
                <div class="stat-label">Valid</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="stat-value" id="warningAlat">0</div>
                <div class="stat-label">Akan Expired (≤7 hari)</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-danger bg-opacity-10 text-danger"><i class="fas fa-times-circle"></i></div>
                <div class="stat-value" id="expiredAlat">0</div>
                <div class="stat-label">Expired</div>
            </div>
        </div>
        
        <div class="chart-card">
            <div class="chart-title">
                <span><i class="fas fa-chart-pie me-2"></i> Status Kalibrasi</span>
                <span id="lastUpdate" style="font-size: 10px; color: #94a3b8;"></span>
            </div>
            <canvas id="statusChart" style="width: 100%; max-height: 250px;"></canvas>
        </div>
        
        <div class="chart-card">
            <div class="chart-title">
                <span><i class="fas fa-bell me-2"></i> Peringatan Kalibrasi</span>
                <button class="btn btn-sm btn-outline-primary" onclick="manualCheck()" style="font-size: 11px;"><i class="fas fa-sync-alt"></i> Cek</button>
            </div>
            <div id="expiringListContainer"></div>
        </div>
        
        <div class="chart-card">
            <div class="chart-title"><span><i class="fas fa-clock me-2"></i> Alat Perlu Kalibrasi Segera</span></div>
            <div class="table-responsive-custom">
                <table class="table-custom" id="urgentTable">
                    <thead><tr><th>Kode</th><th>Nama Alat</th><th>Lokasi</th><th>Due Date</th><th>Sisa Hari</th><th>Aksi</th></tr></thead>
                    <tbody id="urgentTableBody"></tbody>
                </table>
            </div>
        </div>
        
        <div class="update-time" id="updateTimeText">Terakhir diperbarui: --:--</div>
    </div>
    
    <button class="fab-refresh" id="fabRefresh" onclick="forceRefresh()"><i class="fas fa-sync-alt"></i></button>

    <script>
        // ========== DATA MOCK (LANGSUNG PAKAI INI DULU) ==========
        // Data alat kalibrasi untuk demo
        const MOCK_ALAT_DATA = [
            { id: '1', kode_alat: 'TH-001', nama_alat: 'Thermometer Digital', lokasi_painting: 'Oven 1', due_date: '2026-05-15' },
            { id: '2', kode_alat: 'HY-002', nama_alat: 'Hygrometer', lokasi_painting: 'Booth A', due_date: '2026-06-20' },
            { id: '3', kode_alat: 'TG-003', nama_alat: 'Thickness Gauge', lokasi_painting: 'QC Meja', due_date: '2026-04-10' },
            { id: '4', kode_alat: 'AP-004', nama_alat: 'Air Pressure Gauge', lokasi_painting: 'Spray Gun', due_date: '2026-03-28' },
            { id: '5', kode_alat: 'GM-005', nama_alat: 'Gloss Meter', lokasi_painting: 'Inspeksi', due_date: '2026-02-14' },
            { id: '6', kode_alat: 'ST-006', nama_alat: 'Stopwatch', lokasi_painting: 'QC Line', due_date: '2026-01-20' }
        ];
        
        // ========== GLOBAL VARIABLES ==========
        let statusChart = null;
        let refreshInterval = null;
        let currentUser = null;
        
        // ========== FUNGSI BANTU ==========
        function daysUntil(dateStr) {
            if (!dateStr) return Infinity;
            const due = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            due.setHours(0, 0, 0, 0);
            const diffTime = due - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('id-ID');
        }
        
        // ========== AUTH CHECK ==========
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const user = localStorage.getItem('user');
            
            console.log('Auth check - isLoggedIn:', isLoggedIn);
            
            if (isLoggedIn !== 'true' || !user) {
                window.location.href = 'index.html';
                return false;
            }
            
            try {
                currentUser = JSON.parse(user);
                console.log('User:', currentUser.email);
                return true;
            } catch(e) {
                window.location.href = 'index.html';
                return false;
            }
        }
        
        // ========== SETUP USER ==========
        function setupUserInfo() {
            if (!currentUser) return;
            document.getElementById('userName').textContent = currentUser.nama || currentUser.email.split('@')[0];
            document.getElementById('userRole').textContent = currentUser.role || 'User';
            const avatar = (currentUser.nama || currentUser.email).charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = avatar;
        }
        
        // ========== NOTIFICATION ==========
        function showToast(message, type = 'warning') {
            const container = document.getElementById('toastContainer');
            const bgColor = type === 'warning' ? '#fef3c7' : (type === 'danger' ? '#fee2e2' : '#dcfce7');
            const textColor = type === 'warning' ? '#92400e' : (type === 'danger' ? '#991b1b' : '#166534');
            const icon = type === 'warning' ? 'fa-exclamation-triangle' : (type === 'danger' ? 'fa-times-circle' : 'fa-check-circle');
            
            const toast = document.createElement('div');
            toast.style.cssText = `background: ${bgColor}; color: ${textColor}; border-radius: 12px; padding: 12px 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;`;
            toast.innerHTML = `<i class="fas ${icon}"></i><span style="flex:1; font-size:13px;">${message}</span><i class="fas fa-times" style="cursor:pointer;" onclick="this.parentElement.remove()"></i>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        
        // ========== LOAD DASHBOARD (PAKAI MOCK DATA) ==========
        async function loadDashboard() {
            console.log('Loading dashboard with mock data...');
            const alatData = MOCK_ALAT_DATA;
            
            let total = alatData.length;
            let expired = 0, warning = 0, valid = 0;
            let expiringList = [];
            let urgentList = [];
            
            alatData.forEach(alat => {
                const days = daysUntil(alat.due_date);
                if (days < 0) {
                    expired++;
                    urgentList.push({ ...alat, sisaHari: days });
                } else if (days <= 7) {
                    warning++;
                    expiringList.push({ ...alat, sisaHari: days });
                    urgentList.push({ ...alat, sisaHari: days });
                } else {
                    valid++;
                }
            });
            
            // Update stat cards
            document.getElementById('totalAlat').textContent = total;
            document.getElementById('validAlat').textContent = valid;
            document.getElementById('warningAlat').textContent = warning;
            document.getElementById('expiredAlat').textContent = expired;
            
            // Update chart
            if (statusChart) statusChart.destroy();
            const ctx = document.getElementById('statusChart').getContext('2d');
            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Valid', 'Akan Expired (≤7 hari)', 'Expired'],
                    datasets: [{ data: [valid, warning, expired], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
            });
            
            // Update expiring list
            const expiringContainer = document.getElementById('expiringListContainer');
            if (expiringList.length === 0) {
                expiringContainer.innerHTML = '<div class="text-center text-success py-3">✅ Semua alat dalam kondisi baik!</div>';
            } else {
                expiringContainer.innerHTML = expiringList.map(alat => `
                    <div class="alert-item warning">
                        <div class="alert-icon"><i class="fas fa-exclamation-triangle text-warning"></i></div>
                        <div class="alert-content">
                            <div class="alert-title">${alat.kode_alat} - ${alat.nama_alat}</div>
                            <div class="alert-detail">Due: ${formatDate(alat.due_date)} (${alat.sisaHari} hari lagi) • ${alat.lokasi_painting}</div>
                        </div>
                    </div>
                `).join('');
            }
            
            // Update urgent table
            const urgentTableBody = document.getElementById('urgentTableBody');
            if (urgentList.length === 0) {
                urgentTableBody.innerHTML = '<tr><td colspan="6" class="text-center">✅ Tidak ada alat perlu kalibrasi</td</tr>';
            } else {
                urgentTableBody.innerHTML = urgentList.map(alat => `
                    <tr>
                        <td>${alat.kode_alat}</td>
                        <td>${alat.nama_alat}</td>
                        <td>${alat.lokasi_painting}</td>
                        <td>${formatDate(alat.due_date)}</td>
                        <td class="${alat.sisaHari < 0 ? 'text-danger' : 'text-warning'}">${alat.sisaHari < 0 ? 'Expired' : alat.sisaHari + ' hari'}</td>
                        <td><button class="btn btn-sm btn-primary" onclick="alert('Fitur kalibrasi sedang dalam pengembangan')" style="font-size:11px">Kalibrasi</button></td>
                    </tr>
                `).join('');
            }
            
            // Update waktu
            const now = new Date();
            document.getElementById('updateTimeText').innerHTML = `Terakhir diperbarui: ${now.toLocaleTimeString('id-ID')}`;
            document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('id-ID');
        }
        
        // ========== MANUAL FUNCTIONS ==========
        async function manualCheck() {
            showToast('Memeriksa data terbaru...', 'info');
            await loadDashboard();
            showToast('Data berhasil diperbarui!', 'success');
        }
        
        async function forceRefresh() {
            const btn = document.getElementById('fabRefresh');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            await loadDashboard();
            setTimeout(() => btn.innerHTML = '<i class="fas fa-sync-alt"></i>', 500);
            showToast('Dashboard diperbarui!', 'success');
        }
        
        // ========== SIDEBAR ==========
        function initSidebar() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (menuToggle) {
                menuToggle.onclick = () => { sidebar.classList.add('open'); overlay.classList.add('active'); };
                overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); };
            }
        }
        
        // ========== LOGOUT ==========
        function setupLogout() {
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.onclick = (e) => {
                    e.preventDefault();
                    localStorage.clear();
                    window.location.href = 'index.html';
                };
            }
        }
        
        // ========== INIT ==========
        async function init() {
            console.log('Initializing dashboard...');
            if (!checkAuth()) return;
            setupUserInfo();
            initSidebar();
            setupLogout();
            await loadDashboard();
            
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(loadDashboard, 60000);
        }
        
        // Start
        init();
    </script>
</body>
</html>
