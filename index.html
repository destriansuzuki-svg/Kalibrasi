<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monitoring Kalibrasi Painting 2W</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .login-container { max-width: 450px; margin: 5vh auto; }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }
        .card-header i { font-size: 60px; margin-bottom: 15px; }
        .card-header h3 { font-size: 24px; margin-bottom: 5px; }
        .card-body { padding: 40px 30px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { font-weight: 600; margin-bottom: 8px; display: block; }
        .form-group label i { margin-right: 8px; color: #667eea; }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
        }
        .form-control:focus { outline: none; border-color: #667eea; }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-login:hover { transform: translateY(-2px); }
        .alert-message { display: none; padding: 12px; border-radius: 10px; margin-bottom: 20px; }
        .alert-danger { background: #fee2e2; color: #dc2626; }
        .alert-success { background: #dcfce7; color: #16a34a; }
        .alert-warning { background: #fef3c7; color: #92400e; }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .demo-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
        }
        .nav-tabs { margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; }
        .nav-tabs .nav-link {
            border: none;
            font-weight: 600;
            color: #64748b;
            padding: 12px 20px;
        }
        .nav-tabs .nav-link.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            background: transparent;
        }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-tools"></i>
                <h3>Monitoring Kalibrasi</h3>
                <p>Section Painting 2W - PT Suzuki Indomobil Motor</p>
            </div>
            
            <div class="card-body">
                <div id="alertMessage" class="alert-message"></div>
                
                <ul class="nav nav-tabs" id="myTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="changepw-tab" data-bs-toggle="tab" data-bs-target="#changepw" type="button">
                            <i class="fas fa-key"></i> Ganti Password
                        </button>
                    </li>
                </ul>
                
                <div class="tab-content mt-4">
                    <!-- Tab Login -->
                    <div class="tab-pane active" id="login">
                        <form id="loginForm">
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Masukkan email" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
                            </div>
                            <button type="submit" class="btn-login" id="loginBtn">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                        </form>
                    </div>
                    
                    <!-- Tab Ganti Password -->
                    <div class="tab-pane" id="changepw">
                        <form id="changePasswordForm">
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" class="form-control" id="cpEmail" placeholder="Email Anda" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> Password Lama</label>
                                <input type="password" class="form-control" id="oldPassword" placeholder="Password saat ini" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-key"></i> Password Baru</label>
                                <input type="password" class="form-control" id="newPassword" placeholder="Minimal 6 karakter" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-check-circle"></i> Konfirmasi Password Baru</label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Ulangi password baru" required>
                            </div>
                            <button type="submit" class="btn-login" id="changePwBtn">
                                <i class="fas fa-save"></i> Ganti Password
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="demo-info">
                    <p><i class="fas fa-info-circle"></i> <strong>Akun Demo (isi di spreadsheet):</strong></p>
                    <p>📧 admin@suzuki.co.id | 🔑 admin123</p>
                    <p>📧 supervisor@suzuki.co.id | 🔑 super123</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        function showAlert(message, type = 'danger') {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert-message alert-${type}`;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 4000);
        }
        
        function setLoading(isLoading, btnId) {
            const btn = document.getElementById(btnId);
            if (isLoading) {
                btn.innerHTML = '<span class="loading"></span> Memproses...';
                btn.disabled = true;
            } else {
                btn.innerHTML = btnId === 'loginBtn' ? '<i class="fas fa-sign-in-alt"></i> Login' : '<i class="fas fa-save"></i> Ganti Password';
                btn.disabled = false;
            }
        }
        
        // TEST KONEKSI API DULU
        async function testAPI() {
            try {
                console.log('Testing API connection...');
                const response = await fetch(ENDPOINTS.users);
                if (response.ok) {
                    const data = await response.json();
                    console.log('API connected! Data users:', data);
                    return true;
                } else {
                    console.log('API response not OK:', response.status);
                    return false;
                }
            } catch (error) {
                console.error('API connection failed:', error);
                return false;
            }
        }
        
        // ========== LOGIN ==========
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showAlert('Email dan password harus diisi!', 'danger');
                return;
            }
            
            setLoading(true, 'loginBtn');
            
            try {
                console.log('Fetching users from:', ENDPOINTS.users);
                const response = await fetch(ENDPOINTS.users);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const users = await response.json();
                console.log('Users loaded:', users);
                
                if (!users || users.length === 0) {
                    showAlert('Database users kosong! Silakan isi spreadsheet terlebih dahulu.', 'warning');
                    setLoading(false, 'loginBtn');
                    return;
                }
                
                const user = users.find(u => u.email === email && u.password === password);
                
                setLoading(false, 'loginBtn');
                
                if (user) {
                    localStorage.setItem('user', JSON.stringify({
                        email: user.email,
                        role: user.role,
                        nama: user.nama_lengkap,
                        departemen: user.departemen
                    }));
                    localStorage.setItem('isLoggedIn', 'true');
                    showAlert('Login berhasil! Mengarahkan...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showAlert('Email atau password salah! Periksa data di spreadsheet.', 'danger');
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                setLoading(false, 'loginBtn');
                console.error('Login error:', error);
                showAlert(`Gagal terhubung ke database: ${error.message}. Pastikan Google Apps Script sudah di-deploy dan sheet "users" ada.`, 'danger');
            }
        });
        
        // ========== GANTI PASSWORD ==========
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('cpEmail').value.trim();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!email || !oldPassword || !newPassword || !confirmPassword) {
                showAlert('Semua field harus diisi!', 'danger');
                return;
            }
            
            if (newPassword.length < 6) {
                showAlert('Password baru minimal 6 karakter!', 'danger');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showAlert('Password baru tidak cocok!', 'danger');
                return;
            }
            
            setLoading(true, 'changePwBtn');
            
            try {
                const response = await fetch(ENDPOINTS.update, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'updatePassword',
                        email: email,
                        oldPassword: oldPassword,
                        newPassword: newPassword
                    })
                });
                
                const result = await response.json();
                setLoading(false, 'changePwBtn');
                
                if (result.success) {
                    showAlert('✅ Password berhasil diubah! Silakan login dengan password baru.', 'success');
                    document.getElementById('changePasswordForm').reset();
                    document.getElementById('login-tab').click();
                } else {
                    showAlert(result.message || 'Gagal mengubah password', 'danger');
                }
            } catch (error) {
                setLoading(false, 'changePwBtn');
                showAlert('Gagal terhubung ke server', 'danger');
            }
        });
        
        // Cek session sebelumnya
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
        
        // Test API saat halaman load
        testAPI().then(connected => {
            if (connected) {
                console.log('✅ API connected successfully');
            } else {
                console.log('❌ API not connected, check spreadsheet and Apps Script deployment');
                showAlert('⚠️ Gagal konek ke database. Periksa URL Google Apps Script dan pastikan sheet "users" sudah dibuat.', 'warning');
            }
        });
    </script>
</body>
</html>
