<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NPCS PROD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Rajdhani', sans-serif; }
    .font-tech { font-family: 'Orbitron', sans-serif; }
    .bg-pattern {
      background: radial-gradient(circle at 50% 50%, rgba(6,182,212,0.08) 0%, transparent 70%), #0b1221;
    }
    .input-box {
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(6,182,212,0.25);
      transition: all 0.2s;
    }
    .input-box:focus { border-color: #06b6d4; box-shadow: 0 0 0 3px rgba(6,182,212,0.15); outline: none; }
    .btn-primary {
      background: linear-gradient(90deg, #0891b2, #06b6d4);
      transition: all 0.2s;
    }
    .btn-primary:hover { box-shadow: 0 0 16px rgba(6,182,212,0.6); transform: translateY(-1px); }
  </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-[380px]">
    <!-- Card -->
    <div class="bg-slate-900/70 backdrop-blur-md rounded-2xl p-5 border border-cyan-500/20 shadow-2xl">
      
      <!-- Header -->
      <div class="text-center mb-5">
        <div class="inline-flex items-center justify-center w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg mb-2">
          <i class="fas fa-shield-alt text-white text-lg"></i>
        </div>
        <h1 class="font-tech text-xl font-bold text-white tracking-wider">NPCS <span class="text-cyan-400">PROD</span></h1>
        <p class="text-cyan-400/60 text-xs tracking-widest uppercase mt-0.5">Painting Section 2W</p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-3.5">
        <!-- Username -->
        <div class="relative">
          <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-cyan-400/70 text-sm"></i>
          <input type="text" id="username" required class="input-box w-full pl-9 pr-3 py-2 rounded-lg text-white text-sm placeholder-gray-400" placeholder="USERNAME">
        </div>

        <!-- Password -->
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-cyan-400/70 text-sm"></i>
          <input type="password" id="password" required class="input-box w-full pl-9 pr-9 py-2 rounded-lg text-white text-sm placeholder-gray-400" placeholder="Password">
          <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-cyan-400/60 hover:text-cyan-400 transition">
            <i id="eye" class="fas fa-eye text-sm"></i>
          </button>
        </div>

        <!-- Error -->
        <div id="err" class="hidden bg-red-500/15 border border-red-500/40 rounded-lg px-3 py-1.5 text-red-300 text-xs text-center">
          <i class="fas fa-exclamation-circle mr-1"></i><span id="errTxt">Username atau password salah!</span>
        </div>

        <!-- Button -->
        <button type="submit" class="btn-primary w-full py-2.5 rounded-lg text-white font-semibold text-sm tracking-wide flex items-center justify-center gap-2">
          <i class="fas fa-sign-in-alt"></i> SIGN IN
        </button>

        <!-- Footer Options -->
        <div class="flex items-center justify-between pt-1">
          <label class="flex items-center gap-1.5 text-gray-400 text-xs cursor-pointer hover:text-gray-300">
            <input type="checkbox" id="remember" class="accent-cyan-500 w-3.5 h-3.5 rounded">
            <span>Remember username</span>
          </label>
          <button type="button" onclick="alert('Hubungi IT Support untuk reset password.')" class="text-cyan-400/70 text-xs hover:text-cyan-400 underline decoration-dotted">Password Reset</button>
        </div>
      </form>

      <div class="mt-4 pt-3 border-t border-gray-700/50 text-center">
        <p class="text-gray-500 text-[10px]">© 2026 Painting Section 2W • Secure Access</p>
      </div>
    </div>
  </div>

  <script>
    const USERS = { admin: 'admin123', teknisi: 'teknisi123', supervisor: 'supervisor123' };
    
    if(sessionStorage.getItem('auth') === '1') window.location.href = 'dashboard.html';

    function togglePwd() {
      const p = document.getElementById('password');
      const i = document.getElementById('eye');
      p.type = p.type === 'password' ? 'text' : 'password';
      i.classList.toggle('fa-eye'); i.classList.toggle('fa-eye-slash');
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.toLowerCase().trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('err');
      const txt = document.getElementById('errTxt');

      if(USERS[u] && USERS[u] === p) {
        sessionStorage.setItem('auth', '1');
        sessionStorage.setItem('user', u);
        if(document.getElementById('remember').checked) localStorage.setItem('remUser', u);
        else localStorage.removeItem('remUser');
        
        const btn = this.querySelector('button[type="submit"]');
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Loading...';
        setTimeout(() => location.href = 'dashboard.html', 600);
      } else {
        txt.textContent = 'Username atau password salah!';
        err.classList.remove('hidden');
        document.querySelector('.bg-slate-900\\/70').classList.add('animate-[shake_0.3s_ease]');
        setTimeout(() => document.querySelector('.bg-slate-900\\/70').classList.remove('animate-[shake_0.3s_ease]'), 300);
      }
    });

    window.onload = () => {
      const rem = localStorage.getItem('remUser');
      if(rem) { document.getElementById('username').value = rem; document.getElementById('remember').checked = true; }
    };
  </script>
</body>
</html>
