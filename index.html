<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monitoring Kalibrasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }
        .login-header i { font-size: 60px; margin-bottom: 15px; }
        .login-body { padding: 40px 30px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { font-weight: 600; margin-bottom: 8px; display: block; }
        .form-group label i { margin-right: 8px; color: #667eea; }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .alert-message { display: none; padding: 12px; border-radius: 10px; margin-bottom: 20px; }
        .alert-danger { background: #fee2e2; color: #dc2626; }
        .alert-success { background: #dcfce7; color: #16a34a; }
        .demo-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
        }
        .loading {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-tools"></i>
            <h3>Monitoring Kalibrasi</h3>
            <p>Section Painting 2W - PT Suzuki Indomobil Motor</p>
        </div>
        
        <div class="login-body">
            <div id="alertMessage" class="alert-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Masukkan email" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="demo-info">
                <p><i class="fas fa-info-circle"></i> <strong>Akun Demo:</strong></p>
                <p>📧 admin@suzuki.co.id | 🔑 admin123</p>
                <p>📧 supervisor@suzuki.co.id | 🔑 super123</p>
                <p>📧 operator@suzuki.co.id | 🔑 op123</p>
            </div>
        </div>
    </div>

    <script>
        // MOCK DATA USERS
        const MOCK_USERS = [
            { email: 'admin@suzuki.co.id', password: 'admin123', role: 'admin', nama_lengkap: 'Administrator' },
            { email: 'supervisor@suzuki.co.id', password: 'super123', role: 'supervisor', nama_lengkap: 'Siti Rahayu' },
            { email: 'operator@suzuki.co.id', password: 'op123', role: 'operator', nama_lengkap: 'Budi Santoso' }
        ];
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert-message alert-${type}`;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 3000);
        }
        
        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            if (isLoading) {
                btn.innerHTML = '<span class="loading"></span> Memproses...';
                btn.disabled = true;
            } else {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                btn.disabled = false;
            }
        }
        
        // Login handler
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showAlert('Email dan password harus diisi!', 'danger');
                return;
            }
            
            setLoading(true);
            
            // Cari user di mock data
            const user = MOCK_USERS.find(u => u.email === email && u.password === password);
            
            setTimeout(() => {
                setLoading(false);
                
                if (user) {
                    localStorage.setItem('user', JSON.stringify({
                        email: user.email,
                        role: user.role,
                        nama: user.nama_lengkap
                    }));
                    localStorage.setItem('isLoggedIn', 'true');
                    showAlert('Login berhasil! Mengarahkan...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showAlert('Email atau password salah!', 'danger');
                    document.getElementById('password').value = '';
                }
            }, 500);
        });
        
        // Cek session sebelumnya
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
        
        // Pre-fill demo account
        document.getElementById('email').value = 'admin@suzuki.co.id';
        document.getElementById('password').value = 'admin123';
    </script>
</body>
</html>
