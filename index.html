<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monitoring Kalibrasi Painting 2W</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 60px;
            color: #667eea;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: bold;
        }
        .alert {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-tools"></i>
            <h3>Monitoring Kalibrasi</h3>
            <p class="text-muted">Section Painting 2W</p>
            <small>PT Suzuki Indomobil Motor</small>
        </div>
        
        <div class="alert alert-danger" id="alertMessage"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>
        
        <div class="mt-3 text-center text-muted small">
            Demo: admin@suzuki.co.id / admin123
        </div>
    </div>

    <script>
        const API_URL = 'YOUR_GOOGLE_SHEETS_API_URL'; // Ganti dengan API URL Anda
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Fetch users dari Google Spreadsheet
            const response = await fetch(`${API_URL}?sheet=users`);
            const users = await response.json();
            
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Simpan session
                localStorage.setItem('user', JSON.stringify({
                    email: user.email,
                    role: user.role,
                    nama: user.nama_lengkap
                }));
                
                // Redirect ke dashboard
                window.location.href = 'dashboard.html';
            } else {
                const alertDiv = document.getElementById('alertMessage');
                alertDiv.textContent = 'Email atau password salah!';
                alertDiv.style.display = 'block';
                setTimeout(() => alertDiv.style.display = 'none', 3000);
            }
        });
    </script>
</body>
</html>
